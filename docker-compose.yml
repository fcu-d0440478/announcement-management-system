services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: announcements
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d announcements"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@db:5432/announcements?sslmode=disable
      JWT_SECRET: change-this-secret-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:3000,http://localhost:8081
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:

